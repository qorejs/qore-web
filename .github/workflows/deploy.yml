name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run website checks
        run: pnpm check

      - name: Add cache bust timestamp
        run: |
          TIMESTAMP=$(date +%s)
          VERSION=$(date +%Y%m%d%H%M%S)
          printf '{"purged_at": %s, "commit": "%s", "version": "%s"}\n' "$TIMESTAMP" "${{ github.sha }}" "$VERSION" > .vitepress/dist/cache-bust.json
          echo "Added cache-bust.json with timestamp: $TIMESTAMP"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report deployment URL
        run: echo "Deployed to ${{ steps.deployment.outputs.page_url }}"
