name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build
        run: pnpm build
      
      - name: Add cache bust timestamp
        run: |
          TIMESTAMP=$(date +%s)
          echo "{\"purged_at\": $TIMESTAMP, \"commit\": \"${{ github.sha }}\", \"version\": \"$(date +%Y%m%d%H%M%S)\"}" > .vitepress/dist/cache-bust.json
          echo "✅ Added cache-bust.json with timestamp: $TIMESTAMP"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Wait for deployment propagation
        run: |
          echo "⏳ Waiting 15 seconds for GitHub Pages to propagate..."
          sleep 15
      
      - name: Purge CDN cache
        run: |
          echo "🔄 Purging CDN cache..."
          
          # jsDelivr will automatically refresh within 24 hours
          # For immediate refresh, we use cache-busting technique
          
          DEPLOY_URL="${{ steps.deployment.outputs.page_url }}"
          echo "✅ Deployed to: $DEPLOY_URL"
          echo ""
          echo "📦 CDN Cache Information:"
          echo "   - jsDelivr CDN will auto-refresh within 24 hours"
          echo "   - Cache-bust timestamp has been added to cache-bust.json"
          echo "   - For immediate refresh, use versioned assets or query params"
          echo ""
          echo "💡 Tip: Add ?v=\$(date +%s) to static asset URLs to bypass cache"
      
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment and CDN cache purge completed successfully!"
          else
            echo "❌ Deployment or cache purge failed. Please check logs."
          fi
